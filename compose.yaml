services:

  # ─────────────────────────────
  # PostgreSQL Database Service
  # ─────────────────────────────
  db:
    image: postgres:16
    container_name: bookexchange-db
    environment:
      POSTGRES_DB: bookexchangedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookexchangedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # Spring Boot Application
  # ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookexchange-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bookexchangedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
