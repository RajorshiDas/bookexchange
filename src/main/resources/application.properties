spring.application.name=bookexchange

# Disable Spring Boot's automatic Docker Compose management
# (we manage Docker Compose ourselves)
spring.docker.compose.enabled=false

# ?????????????????????????????????????????????????????????
# PostgreSQL Configuration
# Uses environment variables when running inside Docker,
# falls back to localhost values for local development.
# ?????????????????????????????????????????????????????????

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}